<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H4xStore - Transaction Failed</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { fantasy: ['"Cinzel Decorative"'], tech: ['"Rajdhani"'] },
          colors: { primary: '#ff1a1a' }
        }
      }
    }
  </script>

  <style>
    body { background: linear-gradient(135deg, #000000 0%, #0a0a0a 50%, #1a0505 100%); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
    .tech-card { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 26, 26, 0.3); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 26, 26, 0.15); }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div class="tech-card rounded-[2.5rem] p-10 md:p-14 max-w-2xl w-full text-center relative overflow-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-primary/20 blur-[100px] rounded-full pointer-events-none animate-pulse"></div>

    <div class="w-24 h-24 rounded-full bg-primary/10 border border-primary/40 flex items-center justify-center mx-auto mb-8 shadow-[0_0_30px_rgba(255,26,26,0.4)]">
      <i data-lucide="x-circle" class="w-12 h-12 text-primary drop-shadow-[0_0_10px_#ff1a1a]"></i>
    </div>
    
    <h1 class="text-4xl md:text-5xl font-black font-fantasy text-white uppercase tracking-wider mb-4">
      Transaction <span class="text-primary italic">Declined</span>
    </h1>
    
    <p class="text-zinc-400 text-lg md:text-xl mb-8">
      Your payment could not be processed. This may be due to insufficient funds, a network timeout, or a rejected authorization.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <button onclick="window.location.href='Checkout.html'" class="px-8 py-4 bg-primary hover:bg-red-700 text-white rounded-xl font-bold font-fantasy text-sm uppercase tracking-[0.2em] shadow-[0_0_20px_rgba(255,26,26,0.4)] transition-all">
        Retry Payment
      </button>
<button onclick="window.location.href='index.html'" class="px-8 py-4 bg-white/5 hover:bg-white/10 text-white rounded-xl font-bold font-fantasy text-sm uppercase tracking-[0.2em] transition-all border border-white/10">
  Cancel
</button>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
