<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Authenticating...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
  </style>
</head>
<body>
  <div class="text-center">
    <i data-lucide="loader-2" class="w-12 h-12 animate-spin text-[#ff1a1a] mx-auto mb-4"></i>
    <h2 class="text-xl font-bold tracking-widest uppercase">Verifying Discord Connection...</h2>
  </div>

  <script src="auth.js"></script>
  <script>
    lucide.createIcons();

    window.onload = () => {
      // 1. Grab the token from Discord's redirect URL
      const fragment = new URLSearchParams(window.location.hash.slice(1));
      const [accessToken, tokenType] = [fragment.get('access_token'), fragment.get('token_type')];

      if (!accessToken) {
        alert("Authentication failed or cancelled.");
        window.location.href = 'Login.html';
        return;
      }
// 2. Fetch the user's real data securely from Discord's API
      // Send the OAuth token to the backend to let the server validate and fetch user data securely
      (async () => {
        try {
          const result = await apiFetch('/api/auth/oauth/discord', { method: 'POST', body: JSON.stringify({ accessToken, tokenType }) });
          if (!result.success) {
            alert(result.error || 'Discord authentication failed.');
            window.location.href = 'Login.html';
            return;
          }

          const user = result.data.user || result.data;
          // Backend is authoritative for role and ownership
          if (user.role === 'admin') {
            window.location.href = 'H4xShopAdmin.html';
          } else if (user.ownsKey) {
            window.location.href = 'Dashboard.html';
          } else if (user.isAffiliate) {
            window.location.href = 'AffiliateDashboard.html';
          } else {
            window.location.href = 'index.html';
          }
        } catch (err) {
          console.error(err);
          alert('Discord authentication failed.');
          window.location.href = 'Login.html';
        }
      })();
    };
  </script>
</body>
</html>
