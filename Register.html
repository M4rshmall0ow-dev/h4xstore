<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - H4xStore</title>
    <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const ref = params.get('ref');
      if (ref) {
        localStorage.setItem('h4x_affiliate_ref', ref);
      }
    })();
  </script>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com https://cdnjs.cloudflare.com https://discord.com; img-src 'self' data: https:;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Lato:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,700&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Lato"', 'sans-serif'], serif: ['"Playfair Display"', 'serif'], fantasy: ['"Cinzel Decorative"', 'serif'], tech: ['"Rajdhani"', 'sans-serif'], }, colors: { primary: '#ff1a1a', }, animation: { 'gradient-x': 'gradientX 5s ease infinite', 'blob': 'blob 7s infinite', }, keyframes: { gradientX: { '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' }, '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }, }, blob: { '0%': { transform: 'translate(0px, 0px) scale(1)' }, '33%': { transform: 'translate(30px, -50px) scale(1.1)' }, '66%': { transform: 'translate(-20px, 20px) scale(0.9)' }, '100%': { transform: 'translate(0px, 0px) scale(1)' }, } } } } }
  </script>
  <style>
    body { background: linear-gradient(135deg, #000000 0%, #0a0a0a 50%, #140303 100%); color: #E2E8F0; min-height: 100vh; overflow-x: hidden; }
    .glass-card { background: rgba(5, 5, 5, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 26, 26, 0.2); border-top: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 26, 26, 0.05); }
    .text-gradient-magic { background: linear-gradient(-45deg, #ff1a1a, #ffffff, #ff4d4d, #990000); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientX 4s ease infinite; }
    .glow-btn::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,26,26,0.4) 0%, transparent 60%); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .glow-btn:hover::after { opacity: 1; }
    .aurora-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.25; animation: blob 10s infinite cubic-bezier(0.2, 0.8, 0.2, 1); z-index: -2; mix-blend-mode: screen; }
    .custom-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
    .custom-input:focus { border-color: #ff1a1a; box-shadow: 0 0 15px rgba(255,26,26,0.3); outline: none; }
  </style>
</head>
<body class="selection:bg-primary selection:text-white flex flex-col items-center justify-center py-10">

  <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none bg-[#000000]">
    <div class="aurora-blob bg-red-900 w-96 h-96 top-0 right-0"></div>
    <div class="aurora-blob bg-rose-950 w-96 h-96 bottom-0 left-20" style="animation-delay: 4s"></div>
  </div>

  <nav class="fixed top-6 left-0 right-0 z-50 px-4 flex justify-center">
    <a href="index.html" class="flex items-center gap-3 group">
      <span class="text-3xl font-black font-fantasy text-white uppercase tracking-wider drop-shadow-[0_0_10px_rgba(255,26,26,0.5)]">
        H4x<span class="text-gradient-magic">Store</span>
      </span>
    </a>
  </nav>

  <main class="relative z-10 w-full max-w-md px-4 mt-20">
    <div class="glass-card rounded-[2.5rem] p-10 transform transition-all duration-500 hover:border-primary/50 hover:shadow-[0_0_40px_rgba(255,26,26,0.2)]">
      <div class="text-center mb-8">
        <h1 class="font-fantasy font-bold text-4xl text-white uppercase tracking-wider mb-2">Join <span class="text-gradient-magic">Us</span></h1>
        <p class="font-serif italic text-zinc-400">"create your account to get started."</p>
      </div>

      <form id="registerForm" class="space-y-4">
        <div>
          <label class="block font-tech text-xs font-bold uppercase tracking-widest text-zinc-400 mb-2">Username</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500"></i>
            <input type="text" id="reg-username" required class="custom-input w-full rounded-xl py-3 pl-12 pr-4 text-white font-sans" placeholder="your username">
          </div>
        </div>

        <div>
          <label class="block font-tech text-xs font-bold uppercase tracking-widest text-zinc-400 mb-2">Password</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500"></i>
            <input type="password" id="reg-password" required class="custom-input w-full rounded-xl py-3 pl-12 pr-4 text-white font-sans" placeholder="••••••••">
          </div>
        </div>

        <div>
          <label class="block font-tech text-xs font-bold uppercase tracking-widest text-zinc-400 mb-2">Confirm Password</label>
          <div class="relative">
            <i data-lucide="shield-check" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500"></i>
           <input type="password" id="reg-confirm" required class="custom-input w-full rounded-xl py-3 pl-12 pr-4 text-white font-sans" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="glow-btn w-full py-4 bg-gradient-to-r from-red-700 via-primary to-red-600 hover:from-primary hover:to-red-700 text-white rounded-xl font-bold font-sans text-sm tracking-widest shadow-[0_0_20px_rgba(255,26,26,0.4)] transition-all flex justify-center items-center gap-2 mt-2">
          create account
        </button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-white/10"></div>
        </div>
        <div class="relative flex justify-center text-xs">
          <span class="bg-[#050505] px-4 text-zinc-500 font-sans tracking-widest uppercase">or</span>
        </div>
      </div>

      <button id="discordAuthBtn" type="button" class="glow-btn w-full py-4 bg-gradient-to-r from-[#5865F2] to-[#4752C4] hover:from-[#4752C4] hover:to-[#5865F2] text-white rounded-xl font-bold font-sans text-sm tracking-widest shadow-[0_0_20px_rgba(88,101,242,0.3)] transition-all flex justify-center items-center gap-3">
        <svg width="22" height="22" viewBox="0 0 127.14 96.36" fill="currentColor">
          <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.1,46,96,53,91.08,65.69,84.69,65.69Z"/>
        </svg>
        link with discord
      </button>

      <div class="mt-8 text-center border-t border-white/10 pt-6">
        <p class="text-sm font-sans text-zinc-400">already in? <a href="Login.html" class="text-primary font-bold hover:text-white transition-colors underline decoration-primary/30 underline-offset-4">sign in</a></p>
      </div>
    </div>
  </main>

  <script src="auth.js"></script>
<script>
  lucide.createIcons();

  document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const userVal = document.getElementById('reg-username').value.trim();
    const passVal = document.getElementById('reg-password').value;
    const confirmVal = document.getElementById('reg-confirm').value;

    if (passVal !== confirmVal) {
      alert("Passwords do not match!");
      return;
    }

    const result = Auth.register(userVal, passVal);
    
    if (result.success) {
      const params = new URLSearchParams(window.location.search);
      const redirectTarget = params.get('redirect');
      window.location.href = redirectTarget === 'affiliate' ? 'AffiliateDashboard.html' : 'index.html';
    } else {
      alert(result.message);
    }
  });

const discordBtns = document.querySelectorAll('#discordLoginBtn, #discordAuthBtn');

discordBtns.forEach(btn => {
  btn.addEventListener('click', function(e) {
    e.preventDefault();

// 1. PASTE YOUR DISCORD CLIENT ID HERE:
    const CLIENT_ID = "1526555766994239589";

    // 2. AUTOMATICALLY GRAB LIVE REDIRECT URL:
    const currentUrlBase = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
    const REDIRECT_URI = encodeURIComponent(currentUrlBase + "/oauth.html");

    // 3. Send them to Discord
    window.location.href =
      `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify%20email`;
  });
});
</script>
</body>
</html>
